services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: news_capstone_db
      MARIADB_USER: news_capstone_user
      MARIADB_PASSWORD: password123
      MARIADB_ROOT_PASSWORD: rootpassword123
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword123"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
